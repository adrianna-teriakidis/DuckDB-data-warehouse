schema: nhs_data_dev.main
sql: "WITH latest_period AS (\nSELECT max(period_date) max_date\nFROM fact_ae_attendances\n\
  )\n\nSELECT period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']')\
  \ Org,\ncurrent_parent_org,\nbooked as Source,\ntype as Target,\nsum(attendances)\
  \ as Value\nFROM fact_ae_attendances\nINNER JOIN dim_org on fact_ae_attendances.org_code\
  \ = dim_org.org_code\nCROSS JOIN latest_period\nWHERE period_date = latest_period.max_date\n\
  GROUP BY period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\nbooked,\ntype\n\nUNION ALL\n\nSELECT fact_ae_admissions.period_date,\n\
  CONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\ncurrent_parent_org,\n\
  'Type 1' as Source,\n'Not admitted' as Target,\nsum(attendances) - sum(emergency_admissions_type_1)\
  \ as Value\nFROM fact_ae_admissions\nINNER JOIN fact_ae_attendances on fact_ae_admissions.org_code\
  \ = fact_ae_attendances.org_code \n  AND fact_ae_admissions.period_date = fact_ae_attendances.period_date\
  \ \n  AND fact_ae_attendances.type = 'Type 1'\nINNER JOIN dim_org on fact_ae_admissions.org_code\
  \ = dim_org.org_code\nCROSS JOIN latest_period\nWHERE fact_ae_admissions.period_date\
  \ = latest_period.max_date\nGROUP BY fact_ae_admissions.period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\n\nUNION ALL\n\nSELECT fact_ae_admissions.period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\n'Type 2' as Source,\n'Not admitted' as Target,\nsum(attendances)\
  \ - sum(emergency_admissions_type_2) as Value\nFROM fact_ae_admissions\nINNER JOIN\
  \ fact_ae_attendances on fact_ae_admissions.org_code = fact_ae_attendances.org_code\
  \ \n  AND fact_ae_admissions.period_date = fact_ae_attendances.period_date \n  AND\
  \ fact_ae_attendances.type = 'Type 2'\nINNER JOIN dim_org on fact_ae_admissions.org_code\
  \ = dim_org.org_code\nCROSS JOIN latest_period\nWHERE fact_ae_admissions.period_date\
  \ = latest_period.max_date\nGROUP BY fact_ae_admissions.period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\n\nUNION ALL\n\nSELECT fact_ae_admissions.period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\n'Other' as Source,\n'Not admitted' as Target,\nsum(attendances)\
  \ - sum(emergency_admissions_type_2) as Value\nFROM fact_ae_admissions\nINNER JOIN\
  \ fact_ae_attendances on fact_ae_admissions.org_code = fact_ae_attendances.org_code\
  \ \n  AND fact_ae_admissions.period_date = fact_ae_attendances.period_date \n  AND\
  \ fact_ae_attendances.type = 'Other'\nINNER JOIN dim_org on fact_ae_admissions.org_code\
  \ = dim_org.org_code\nCROSS JOIN latest_period\nWHERE fact_ae_admissions.period_date\
  \ = latest_period.max_date\nGROUP BY fact_ae_admissions.period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\n\n\nUNION ALL\n\nSELECT period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\n'Type 1' as Source,\n'Emergency Admissions' as Target,\nsum(emergency_admissions_type_1)\
  \ as Value\nFROM fact_ae_admissions\nINNER JOIN dim_org on fact_ae_admissions.org_code\
  \ = dim_org.org_code\nCROSS JOIN latest_period\nWHERE period_date = latest_period.max_date\n\
  GROUP BY period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\n\nUNION ALL\n\nSELECT period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\n'Type 2' as Source,\n'Emergency Admissions' as Target,\nsum(emergency_admissions_type_2)\
  \ as Value\nFROM fact_ae_admissions\nINNER JOIN dim_org on fact_ae_admissions.org_code\
  \ = dim_org.org_code\nCROSS JOIN latest_period\nWHERE period_date = latest_period.max_date\n\
  GROUP BY period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\n\nUNION ALL\n\nSELECT period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\n'Other' as Source,\n'Emergency Admissions' as Target,\nsum(emergency_admissions_other)\
  \ as Value\nFROM fact_ae_admissions\nINNER JOIN dim_org on fact_ae_admissions.org_code\
  \ = dim_org.org_code\nCROSS JOIN latest_period\nWHERE period_date = latest_period.max_date\n\
  GROUP BY period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\n\nUNION ALL\n\nSELECT period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\n'Emergency Admissions' as Source,\n'Waited under 4 hrs' as\
  \ Target,\nsum(total_emergency_admissions) - (sum(admissions_waited_4_12hrs)+ sum(admissions_waited_12plus_hrs))\
  \ as Value\nFROM fact_ae_admissions\nINNER JOIN dim_org on fact_ae_admissions.org_code\
  \ = dim_org.org_code\nCROSS JOIN latest_period\nWHERE period_date = latest_period.max_date\n\
  GROUP BY period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\nUNION ALL\n\nSELECT period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\n'Emergency Admissions' as Source,\n'Waited 4-12 hrs' as Target,\n\
  sum(admissions_waited_4_12hrs) as Value\nFROM fact_ae_admissions\nINNER JOIN dim_org\
  \ on fact_ae_admissions.org_code = dim_org.org_code\nCROSS JOIN latest_period\n\
  WHERE period_date = latest_period.max_date\nGROUP BY period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\n\nUNION ALL\n\nSELECT period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org,\n'Emergency Admissions' as Source,\n'Waited > 12 hrs' as Target,\n\
  sum(admissions_waited_12plus_hrs) as Value\nFROM fact_ae_admissions\nINNER JOIN\
  \ dim_org on fact_ae_admissions.org_code = dim_org.org_code\nCROSS JOIN latest_period\n\
  WHERE period_date = latest_period.max_date\nGROUP BY period_date,\nCONCAT(dim_org.current_org_name,'[',dim_org.org_code,']'),\n\
  current_parent_org\n"
