schema: nhs_data.main
sql: 'WITH latest_period AS (

  SELECT max(period_date) max_date

  FROM fact_ae_attendances

  )


  SELECT period_date,

  CONCAT(dim_org.current_org_name,''['',dim_org.org_code,'']'') Org,

  current_parent_org,

  booked as Source,

  type as Target,

  sum(attendances) as Value

  FROM fact_ae_attendances

  INNER JOIN dim_org on fact_ae_attendances.org_code = dim_org.org_code

  CROSS JOIN latest_period

  WHERE period_date = latest_period.max_date

  GROUP BY period_date,

  CONCAT(dim_org.current_org_name,''['',dim_org.org_code,'']''),

  current_parent_org,

  booked,

  type


  UNION ALL


  SELECT period_date,

  CONCAT(dim_org.current_org_name,''['',dim_org.org_code,'']''),

  current_parent_org,

  type as Source,

  ''Over 4 hrs'' as Target,

  sum(attendances_over_4hrs) as Value

  FROM fact_ae_attendances

  INNER JOIN dim_org on fact_ae_attendances.org_code = dim_org.org_code

  CROSS JOIN latest_period

  WHERE period_date = latest_period.max_date

  GROUP BY period_date,

  CONCAT(dim_org.current_org_name,''['',dim_org.org_code,'']''),

  current_parent_org,

  type


  UNION ALL


  SELECT period_date,

  CONCAT(dim_org.current_org_name,''['',dim_org.org_code,'']''),

  current_parent_org,

  type as Source,

  ''Within 4 hrs'' as Target,

  sum(attendances) - sum(attendances_over_4hrs) as Value

  FROM fact_ae_attendances

  INNER JOIN dim_org on fact_ae_attendances.org_code = dim_org.org_code

  CROSS JOIN latest_period

  WHERE period_date = latest_period.max_date

  GROUP BY period_date,

  CONCAT(dim_org.current_org_name,''['',dim_org.org_code,'']''),

  current_parent_org,

  type'
